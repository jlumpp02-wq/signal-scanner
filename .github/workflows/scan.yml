name: SignalScanner — Asymmetric Opportunity Bot

on:
  schedule:
    # Runs every hour — the script itself decides whether to alert
    # based on signal intensity (adaptive frequency)
    - cron: '0 * * * *'
  workflow_dispatch:  # Manual trigger

env:
  DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}

jobs:
  scan:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Restore last scan
        id: cache
        uses: actions/cache@v4
        with:
          path: last_scan.json
          key: scan-${{ github.run_number }}
          restore-keys: scan-

      - name: Run Scanner
        run: python signal_scanner.py

      - name: Save scan results
        if: always()
        uses: actions/cache/save@v4
        with:
          path: last_scan.json
          key: scan-${{ github.run_number }}
