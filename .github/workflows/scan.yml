name: SignalScanner

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

env:
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
  DASHBOARD_URL: ${{ secrets.DASHBOARD_URL }}

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run Scanner
        run: python signal_scanner.py

      - name: Deploy Dashboard
        run: |
          git config user.name "SignalScanner Bot"
          git config user.email "bot@signalscanner"
          git add docs/
          git diff --cached --quiet || git commit -m "scan: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
